<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Insert title here</title>
    <link rel="stylesheet" href="reg.css" />
  </head>
      <style>
            .container {
  font-size: 20pt;
}
.items {
  margin: 0 auto;
  border: 1px solid black;
  display: flex;
  width: 450px;
  height: 85px;
  align-items: center;
}
.item1 {
  text-align: center;
  padding-left: 30px;
  width: 35%;
  /* border: 1px solid red; */
}
.item2 {
  /* border: 1px solid red; */
  text-align: center;
  width: 65%;
}

.item2 .text-input {
  width: 70%;
  height: 25px;
  font-size: 15pt;
  border-radius: 5px;
}

select {
  width: 150px;
  height: 50px;
  font-size: 18pt;
}

.interest {
  flex-wrap: wrap;
  font-size: 18pt;
}
.text {
  height: 120px;
}
.items textarea {
  width: 200px;
  height: 100px;
  resize: none;
}

.items textarea:focus {
  outline-color: green;
}
.button {
  width: 100%;
  text-align: center;
}
.item3 button {
  width: 300px;
  height: 60px;
  font-size: 25pt;
  background-color: black;
  color: white;
}

      </style>
  <body>
    <form action="Reg" method="post">
      <div class="container">
        <div class="items">
          <div class="item1">Name</div>
          <div class="item2">
            <input name="name" class="text-input" />
          </div>
        </div>
        <div class="items">
          <div class="item1">ID</div>
          <div class="item2">
            <input name="id" class="text-input" />
          </div>
        </div>
        <div class="items">
          <div class="item1">PW</div>
          <div class="item2">
            <input name="pw" class="text-input" />
          </div>
        </div>
        <div class="items">
          <div class="item1">Gender</div>
          <div class="item2">
            <label> male<input type="radio" name="gender" value="male" checked="checked" /></label>
            <label> female<input type="radio" name="gender" value="female"/> </label>
          </div>
        </div>
        <div class="items">
          <div class="item1">Addr</div>
          <div class="item2">
            <select name="addr">
              <option value="seoul">Seoul</option>
              <option value="kyeonggi">Kyeonggi</option>
              <option value="daejeon">Daejeon</option>
              <option value="daegu">Daegu</option>
              <option value="busan" selected="selected">Busan</option>
            </select>
          </div>
        </div>
        <div class="items inter">
          <div class="item1">Interest</div>
          <div class="item2 interest">
            <div>
              <label
                ><input name="interest" type="checkbox" value="food" />Food
              </label>
              <label
                ><input name="interest" type="checkbox" value="excer" />Excer
              </label>
            </div>
            <div>
              <label
                ><input
                  name="interest"
                  type="checkbox"
                  value="develop"
                />Develop
              </label>
              <label
                ><input name="interest" type="checkbox" value="travel" />Travel
              </label>
            </div>
          </div>
        </div>
        <div class="items text">
          <div class="item1">Introduce</div>
          <div class="item2">
            <textarea name="introduce"></textarea>
          </div>
        </div>
        <div class="items item3">
          <div class="button"><button>sign up</button></div>
        </div>
      </div>
    </form>
  </body>
</html>
